services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edupulse
      POSTGRES_PASSWORD: edupulse
      POSTGRES_DB: edupulse
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U edupulse']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: edupulse
      MINIO_ROOT_PASSWORD: edupulse-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - '8080:8080'
    volumes:
      - keycloak_data:/opt/keycloak/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgresql://edupulse:edupulse@postgres:5432/edupulse?schema=public
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '3000'

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '3443:443'
      - '3080:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api

  backup-cron:
    image: alpine:3.20
    command: ['/bin/sh', '/backup/cron-entrypoint.sh']
    environment:
      PGHOST: postgres
      PGUSER: edupulse
      PGPASSWORD: edupulse
      PGDATABASE: edupulse
      BACKUP_DIR: /backups
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: edupulse
      MINIO_SECRET_KEY: edupulse-secret
    volumes:
      - ./backup/backup.sh:/backup/backup.sh:ro
      - ./backup/cron-entrypoint.sh:/backup/cron-entrypoint.sh:ro
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  backup:
    image: postgres:16-alpine
    profiles: ['backup-manual']
    environment:
      PGHOST: postgres
      PGUSER: edupulse
      PGPASSWORD: edupulse
      PGDATABASE: edupulse
      BACKUP_DIR: /backups
    volumes:
      - ./backup/backup.sh:/backup.sh:ro
      - backup_data:/backups
    entrypoint: ['/bin/sh', '/backup.sh']
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  keycloak_data:
  backup_data:
